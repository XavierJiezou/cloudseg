name: cloudseg
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.*
  - torchvision=0.*
  - lightning=2.*
  - torchmetrics=0.*
  - hydra-core=1.*
  - rich=13.*
  - pre-commit=3.*
  - pytest=7.*
  - pip>=23
  - pip:
      - torchmetrics
      - hydra-core
      - hydra-optuna-sweeper
      - hydra-colorlog
      - rich
      - pytest
      - rootutils
      - wandb
      - aim
      - gradio
      - image-dehazer
      - thop
      - albumentations
      - segmentation_models_pytorch