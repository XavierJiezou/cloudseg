_target_: src.data.l8_biome_datamodule.L8BiomeDataModule
root: /data/zouxuechao/cloudseg/l8_biome/BC
train_pipeline:
  all_transform:
    _target_: albumentations.Compose
    transforms:
      - _target_: albumentations.HorizontalFlip
        p: 0.5
      - _target_: albumentations.ShiftScaleRotate
        p: 1

  img_transform:
    _target_: albumentations.Compose
    transforms:
      - _target_: albumentations.pytorch.transforms.ToTensorV2

  ann_transform: null
val_pipeline: null

  img_transform:
    _target_: albumentations.Compose
    transforms:
      - _target_: albumentations.pytorch.transforms.ToTensorV2
  ann_transform: null

test_pipeline: null

  img_transform:
    _target_: albumentations.Compose
    transforms:
      - _target_: albumentations.pytorch.transforms.ToTensorV2
  ann_transform: null

bands:
  - "4"
  - "3"
  - "2"
batch_size: 8
num_workers: 4
pin_memory: True
persistent_workers: True